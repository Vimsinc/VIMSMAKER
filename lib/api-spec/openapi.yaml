openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VibeManager — Gerador de Conteúdo Viral com IA
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Browser and mobile authentication endpoints.
  - name: trending
    description: Trending topics
  - name: generate
    description: AI content generation
  - name: images
    description: Image generation
  - name: video
    description: Video processing
  - name: instagram
    description: Instagram publishing

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/user:
    get:
      tags: [auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to returnTo on success or /api/login on failure.

  /logout:
    get:
      tags: [auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  # ── Trending ──────────────────────────────────────────────────────────────
  /trending/suggestions:
    get:
      operationId: getTrendingSuggestions
      tags: [trending]
      summary: Get trending topic suggestions
      parameters:
        - name: niche
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Trending topics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingResponse"

  /trending/search:
    post:
      operationId: searchTrendingTopics
      tags: [trending]
      summary: Search trending topics by query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrendingSearchBody"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingResponse"

  /trending/google-trends:
    post:
      operationId: getGoogleTrends
      tags: [trending]
      summary: Get Google Trends data for a keyword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleTrendsBody"
      responses:
        "200":
          description: Google Trends results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleTrendsResponse"

  # ── Generate ──────────────────────────────────────────────────────────────
  /generate/ideas:
    post:
      operationId: generateIdeas
      tags: [generate]
      summary: Generate 3 viral content ideas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateIdeasBody"
      responses:
        "200":
          description: Generated ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdeasResponse"

  /generate/carousel:
    post:
      operationId: generateCarousel
      tags: [generate]
      summary: Generate full carousel content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCarouselBody"
      responses:
        "200":
          description: Carousel slides + legend + hashtags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarouselResponse"

  /generate/legend:
    post:
      operationId: generateLegend
      tags: [generate]
      summary: Generate viral caption and hashtags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateLegendBody"
      responses:
        "200":
          description: Legend and hashtags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegendResponse"

  /generate/history:
    get:
      operationId: getGenerationHistory
      tags: [generate]
      summary: Get generation history
      responses:
        "200":
          description: History list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GenerationRecord"

  # ── Images ────────────────────────────────────────────────────────────────
  /images/generate:
    post:
      operationId: generateImage
      tags: [images]
      summary: Generate image with Runware
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateImageBody"
      responses:
        "200":
          description: Generated image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageResult"

  /images/generate-gemini:
    post:
      operationId: generateImageGemini
      tags: [images]
      summary: Generate image with Gemini AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateGeminiImageBody"
      responses:
        "200":
          description: Generated image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageResult"

  /images/card-file/{filename}:
    get:
      operationId: getCardFile
      tags: [images]
      summary: Serve generated image file
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image file

  # ── Video ─────────────────────────────────────────────────────────────────
  /video/process:
    post:
      operationId: processVideo
      tags: [video]
      summary: Process video for Reels format
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProcessVideoBody"
      responses:
        "200":
          description: Processed video info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResult"

  /video/download/{filename}:
    get:
      operationId: downloadVideo
      tags: [video]
      summary: Download processed video
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video file

  # ── Instagram ─────────────────────────────────────────────────────────────
  /instagram/accounts:
    get:
      operationId: getInstagramAccounts
      tags: [instagram]
      summary: List configured Instagram accounts
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstagramAccount"

  /instagram/publish:
    post:
      operationId: publishToInstagram
      tags: [instagram]
      summary: Publish a post to Instagram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstagramPublishBody"
      responses:
        "200":
          description: Published post info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramPublishResult"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Auth schemas ──────────────────────────────────────────────────────────
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Trending schemas ──────────────────────────────────────────────────────
    TrendingTopic:
      type: object
      required: [title]
      properties:
        title:
          type: string
        snippet:
          type: string

    TrendingResponse:
      type: object
      required: [topics]
      properties:
        topics:
          type: array
          items:
            $ref: "#/components/schemas/TrendingTopic"
        cached:
          type: boolean

    TrendingSearchBody:
      type: object
      required: [query]
      properties:
        query:
          type: string

    GoogleTrendsBody:
      type: object
      required: [keyword]
      properties:
        keyword:
          type: string

    GoogleTrendsTopic:
      type: object
      required: [query, peakValue, trend]
      properties:
        query:
          type: string
        values:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              value:
                type: number
        peakValue:
          type: number
        trend:
          type: string
          enum: [up, down, stable]

    GoogleTrendsResponse:
      type: object
      required: [topics]
      properties:
        topics:
          type: array
          items:
            $ref: "#/components/schemas/GoogleTrendsTopic"

    # ── Generate schemas ──────────────────────────────────────────────────────
    GenerateIdeasBody:
      type: object
      required: [theme]
      properties:
        theme:
          type: string
        niche:
          type: string

    ContentIdea:
      type: object
      required: [id, title, hook, angle, format, viralScore]
      properties:
        id:
          type: integer
        title:
          type: string
        hook:
          type: string
        angle:
          type: string
        format:
          type: string
        viralScore:
          type: integer

    IdeasResponse:
      type: object
      required: [ideas]
      properties:
        ideas:
          type: array
          items:
            $ref: "#/components/schemas/ContentIdea"

    GenerateCarouselBody:
      type: object
      required: [theme, idea]
      properties:
        theme:
          type: string
        niche:
          type: string
        idea:
          type: string

    CarouselSlide:
      type: object
      required: [number, title, body]
      properties:
        number:
          type: integer
        title:
          type: string
        body:
          type: string
        cta:
          type: string

    CarouselResponse:
      type: object
      required: [slides, legend, hashtags]
      properties:
        slides:
          type: array
          items:
            $ref: "#/components/schemas/CarouselSlide"
        legend:
          type: string
        hashtags:
          type: array
          items:
            type: string

    GenerateLegendBody:
      type: object
      required: [theme]
      properties:
        theme:
          type: string
        niche:
          type: string
        tone:
          type: string

    LegendResponse:
      type: object
      required: [legend, hashtags]
      properties:
        legend:
          type: string
        hashtags:
          type: array
          items:
            type: string

    GenerationRecord:
      type: object
      required: [id, theme, type, content, createdAt]
      properties:
        id:
          type: integer
        theme:
          type: string
        niche:
          type: string
          nullable: true
        type:
          type: string
        content:
          type: string
        imageModel:
          type: string
          nullable: true
        imageUrls:
          type: string
          nullable: true
        createdAt:
          type: string

    # ── Images schemas ────────────────────────────────────────────────────────
    GenerateImageBody:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        width:
          type: integer
        height:
          type: integer

    GenerateGeminiImageBody:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        quality:
          type: string
          enum: [flash, pro]

    ImageResult:
      type: object
      required: [url]
      properties:
        url:
          type: string

    # ── Video schemas ─────────────────────────────────────────────────────────
    ProcessVideoBody:
      type: object
      properties:
        startTime:
          type: number
        endTime:
          type: number
        addCaptions:
          type: boolean
        convertToReels:
          type: boolean

    VideoResult:
      type: object
      required: [filename, downloadUrl]
      properties:
        filename:
          type: string
        downloadUrl:
          type: string
        transcript:
          type: string
          nullable: true
        duration:
          type: number
          nullable: true

    # ── Instagram schemas ─────────────────────────────────────────────────────
    InstagramAccount:
      type: object
      required: [account, displayName, specialty, hasToken, hasUserId]
      properties:
        account:
          type: string
        displayName:
          type: string
        specialty:
          type: string
        hasToken:
          type: boolean
        hasUserId:
          type: boolean

    InstagramPublishBody:
      type: object
      required: [account, imageUrl, caption]
      properties:
        account:
          type: string
        imageUrl:
          type: string
        caption:
          type: string

    InstagramPublishResult:
      type: object
      required: [postId, permalink]
      properties:
        postId:
          type: string
        permalink:
          type: string
