openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VibeManager — Gerador de Conteúdo Viral com IA
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: trending
    description: Trending topics
  - name: generate
    description: AI content generation
  - name: images
    description: Image generation
  - name: video
    description: Video processing

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Trending ──────────────────────────────────────────────────────────────
  /trending/suggestions:
    get:
      operationId: getTrendingSuggestions
      tags: [trending]
      summary: Get trending topic suggestions
      parameters:
        - name: niche
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Trending topics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingResponse"

  /trending/search:
    post:
      operationId: searchTrendingTopics
      tags: [trending]
      summary: Search trending topics by query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrendingSearchBody"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingResponse"

  # ── Generate ──────────────────────────────────────────────────────────────
  /generate/ideas:
    post:
      operationId: generateIdeas
      tags: [generate]
      summary: Generate 3 viral content ideas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateIdeasBody"
      responses:
        "200":
          description: Generated ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdeasResponse"

  /generate/carousel:
    post:
      operationId: generateCarousel
      tags: [generate]
      summary: Generate full carousel content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCarouselBody"
      responses:
        "200":
          description: Carousel slides + legend + hashtags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarouselResponse"

  /generate/legend:
    post:
      operationId: generateLegend
      tags: [generate]
      summary: Generate viral caption and hashtags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateLegendBody"
      responses:
        "200":
          description: Legend and hashtags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegendResponse"

  /generate/history:
    get:
      operationId: getGenerationHistory
      tags: [generate]
      summary: Get generation history
      responses:
        "200":
          description: History list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GenerationRecord"

  # ── Images ────────────────────────────────────────────────────────────────
  /images/generate:
    post:
      operationId: generateImage
      tags: [images]
      summary: Generate image with Runware
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateImageBody"
      responses:
        "200":
          description: Generated image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageResult"

  /images/generate-gemini:
    post:
      operationId: generateImageGemini
      tags: [images]
      summary: Generate image with Gemini AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateGeminiImageBody"
      responses:
        "200":
          description: Generated image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageResult"

  /images/card-file/{filename}:
    get:
      operationId: getCardFile
      tags: [images]
      summary: Serve generated image file
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image file

  # ── Video ─────────────────────────────────────────────────────────────────
  /video/process:
    post:
      operationId: processVideo
      tags: [video]
      summary: Process video for Reels format
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProcessVideoBody"
      responses:
        "200":
          description: Processed video info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResult"

  /video/download/{filename}:
    get:
      operationId: downloadVideo
      tags: [video]
      summary: Download processed video
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video file

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    TrendingTopic:
      type: object
      required: [title]
      properties:
        title:
          type: string
        snippet:
          type: string

    TrendingResponse:
      type: object
      required: [topics]
      properties:
        topics:
          type: array
          items:
            $ref: "#/components/schemas/TrendingTopic"
        cached:
          type: boolean

    TrendingSearchBody:
      type: object
      required: [query]
      properties:
        query:
          type: string

    GenerateIdeasBody:
      type: object
      required: [theme]
      properties:
        theme:
          type: string
        niche:
          type: string

    ContentIdea:
      type: object
      required: [id, title, hook, angle, format, viralScore]
      properties:
        id:
          type: integer
        title:
          type: string
        hook:
          type: string
        angle:
          type: string
        format:
          type: string
        viralScore:
          type: integer

    IdeasResponse:
      type: object
      required: [ideas]
      properties:
        ideas:
          type: array
          items:
            $ref: "#/components/schemas/ContentIdea"

    GenerateCarouselBody:
      type: object
      required: [theme, idea]
      properties:
        theme:
          type: string
        niche:
          type: string
        idea:
          type: string

    CarouselSlide:
      type: object
      required: [number, title, body]
      properties:
        number:
          type: integer
        title:
          type: string
        body:
          type: string
        cta:
          type: string

    CarouselResponse:
      type: object
      required: [slides, legend, hashtags]
      properties:
        slides:
          type: array
          items:
            $ref: "#/components/schemas/CarouselSlide"
        legend:
          type: string
        hashtags:
          type: array
          items:
            type: string

    GenerateLegendBody:
      type: object
      required: [theme]
      properties:
        theme:
          type: string
        niche:
          type: string
        tone:
          type: string

    LegendResponse:
      type: object
      required: [legend, hashtags]
      properties:
        legend:
          type: string
        hashtags:
          type: array
          items:
            type: string

    GenerationRecord:
      type: object
      required: [id, theme, type, content, createdAt]
      properties:
        id:
          type: integer
        theme:
          type: string
        niche:
          type: string
          nullable: true
        type:
          type: string
        content:
          type: string
        imageModel:
          type: string
          nullable: true
        imageUrls:
          type: string
          nullable: true
        createdAt:
          type: string

    GenerateImageBody:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        account:
          type: string
        width:
          type: integer
        height:
          type: integer

    GenerateGeminiImageBody:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        account:
          type: string
        quality:
          type: string
          enum: [flash, pro]

    ImageResult:
      type: object
      required: [url]
      properties:
        url:
          type: string

    ProcessVideoBody:
      type: object
      properties:
        startTime:
          type: number
        endTime:
          type: number
        addCaptions:
          type: boolean
        convertToReels:
          type: boolean

    VideoResult:
      type: object
      required: [filename, downloadUrl]
      properties:
        filename:
          type: string
        downloadUrl:
          type: string
        transcript:
          type: string
          nullable: true
        duration:
          type: number
          nullable: true
